name: Build and Push Docker Image

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin

      - name: Prepare image metadata
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SHA_TAG="${IMAGE}:sha-${GITHUB_SHA}"
          LATEST_TAG="${IMAGE}:latest"
          SOURCE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"

          {
            echo "image=${IMAGE}"
            echo "sha_tag=${SHA_TAG}"
            echo "latest_tag=${LATEST_TAG}"
            echo "source_url=${SOURCE_URL}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        run: |
          docker buildx build \
            --push \
            --tag "${{ steps.meta.outputs.sha_tag }}" \
            --tag "${{ steps.meta.outputs.latest_tag }}" \
            --label "org.opencontainers.image.source=${{ steps.meta.outputs.source_url }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            .
